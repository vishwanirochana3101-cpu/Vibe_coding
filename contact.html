<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Vishwani Rochana</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Roboto', sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 50%, #d0d0d0 100%);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), 0 0 20px rgba(102, 126, 234, 0.3);
            max-width: 800px;
            width: 90%;
            padding: 50px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15), 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .header {
            margin-bottom: 50px;
        }

        .title {
            font-size: 36px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 20px;
            font-weight: 400;
            color: #666;
        }

        .contact-info {
            margin-top: 50px;
            margin-bottom: 50px;
        }

        .contact-item {
            margin-bottom: 30px;
        }

        .contact-item h3 {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .contact-item p {
            font-size: 18px;
            color: #555;
        }

        .button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
            margin-top: 30px;
            margin-bottom: 50px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }

        .message {
            font-size: 20px;
            font-weight: 300;
            color: #666;
            margin-top: 50px;
            margin-bottom: 50px;
            font-style: italic;
        }

        .social-icons {
            margin-top: 50px;
            margin-bottom: 60px;
        }

        .social-icons h3 {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .icon {
            font-size: 40px;
            color: #667eea;
            transition: transform 0.3s ease, color 0.3s ease;
            text-decoration: none;
        }

        .icon:hover {
            transform: scale(1.2);
            color: #764ba2;
        }

        .footer {
            margin-top: 60px;
            padding-top: 30px;
            padding-bottom: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">Contact Me</div>
            <div class="subtitle">Vishwani Rochana - Information Technology Undergraduate</div>
        </div>

        <div class="contact-info">
            <div class="contact-item">
                <h3>Email</h3>
                <p>vishwanirochana3101@gmail.com</p>
            </div>
        </div>

        <a href="https://www.linkedin.com/in/yourprofile" class="button">Visit My LinkedIn</a>

        <div class="message">
            Let's connect and build something amazing together!
        </div>

        <div class="social-icons">
            <h3>Follow Me</h3>
            <div class="icons">
                <a href="https://wa.me/yourwhatsappnumber" class="icon" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/yourprofile" class="icon" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://www.linkedin.com/in/yourprofile" class="icon" target="_blank"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 Vishwani Rochana. All rights reserved. | Designed with passion for technology.</p>
        </div>
    </div>
</body>
</html>
